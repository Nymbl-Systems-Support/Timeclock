<head>
<meta charset="UTF-8" />

<title>Nymbl Systems Support — Timeclock</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F7F7F7;
  --surface:#FFFFFF;
  --surface2:#F0EEFF;
  --border:#E2DAFF;
  --text:#07051E;
  --muted:#7B6FA8;
  --accent:#7748FF;
  --accent-dark:#26045E;
  --accent-light:#EDE8FF;
  --danger:#FF5959;
  --danger-light:rgba(255,89,89,0.1);
  --warn:#F59E0B;
  --warn-light:rgba(245,158,11,0.1);
  --radius:14px;
  --radius-sm:10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:#F7F7F7;color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2rem 1rem;}
.container{width:100%;max-width:420px;}
.logo-wrap{text-align:center;margin-bottom:2rem;padding-top:0.5rem;}
.logo-wrap img{height:44px;width:auto;}
.logo-wrap .sub{font-size:11px;color:#7B6FA8;margin-top:6px;letter-spacing:0.08em;text-transform:uppercase;font-family:'Inter',sans-serif;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;margin-bottom:12px;}
.card-title{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:1rem;}
input,select{width:100%;padding:11px 14px;border:1px solid #E2DAFF;border-radius:var(--radius-sm);font-family:'Inter',sans-serif;font-size:15px;background:#F8F5FF;color:#07051E;outline:none;transition:border-color 0.15s;}
input:focus,select:focus{border-color:var(--accent);}
input::placeholder{color:var(--muted);}
select option{background:var(--surface2);}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:11px 20px;border-radius:var(--radius-sm);font-family:'Inter',sans-serif;font-size:14px;font-weight:500;cursor:pointer;border:1px solid #E2DAFF;background:#FFFFFF;color:#07051E;transition:all 0.15s;white-space:nowrap;}
.btn:hover{background:#F0EEFF;}
.btn-primary{background:#7748FF;border-color:#7748FF;color:#fff;}
.btn-primary:hover{background:#26045E;border-color:#26045E;}
.btn-danger{background:#FF5959;border-color:#FF5959;color:#fff;}
.btn-danger:hover{opacity:0.88;}
.btn-full{width:100%;padding:14px;font-size:15px;}
.btn-sm{padding:6px 12px;font-size:12px;}
.btn-ghost{border-color:transparent;background:transparent;color:#7B6FA8;}
.btn-ghost:hover{color:#07051E;background:#F0EEFF;}
.badge{display:inline-block;font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;letter-spacing:0.02em;}
.badge-in{background:#EDE8FF;color:#26045E;}
.badge-lunch{background:var(--warn-light);color:var(--warn);}
.badge-out{background:rgba(139,135,176,0.15);color:var(--muted);}
.badge-pto{background:rgba(56,189,248,0.15);color:#38BDF8;}
.badge-sick{background:var(--danger-light);color:#FF8080;}
.badge-holiday{background:rgba(52,211,153,0.15);color:#34D399;}
.agent-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:opacity 0.12s;}
.agent-row:last-child{border-bottom:none;}
.agent-row:hover{opacity:0.7;}
.avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0;font-family:'Sora',sans-serif;}
.pinpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:240px;margin:0 auto;}
.pinkey{height:58px;font-size:22px;font-family:'Sora',sans-serif;font-weight:600;border:1px solid #E2DAFF;border-radius:var(--radius-sm);background:#FFFFFF;color:#07051E;cursor:pointer;transition:background 0.1s,transform 0.08s;}
.pinkey:hover{background:#F0EEFF;}
.pinkey:active{transform:scale(0.94);}
.pin-dots{display:flex;gap:14px;justify-content:center;margin:1.25rem 0;}
.pin-dot{width:12px;height:12px;border-radius:50%;border:2px solid #E2DAFF;transition:all 0.15s;}
.pin-dot.filled{background:#7748FF;border-color:#7748FF;}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.25rem;}
.stat{background:#F0EEFF;border:1px solid #E2DAFF;border-radius:var(--radius-sm);padding:14px 12px;text-align:center;}
.stat-val{font-size:24px;font-weight:700;font-family:'Sora',sans-serif;color:var(--text);}
.stat-label{font-size:10px;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:0.07em;}
.err{color:var(--danger);font-size:13px;text-align:center;min-height:18px;margin-top:8px;}
.ok{color:#34D399;font-size:13px;text-align:center;min-height:18px;margin-top:8px;}
.time-display{font-family:'Sora',sans-serif;font-size:42px;font-weight:700;text-align:center;letter-spacing:-1px;margin:0.5rem 0;color:var(--text);}
.punch-row{display:flex;justify-content:space-between;align-items:center;font-size:13px;padding:7px 0;border-bottom:1px solid var(--border);color:var(--muted);}
.punch-row:last-child{border-bottom:none;}
.punch-row span:last-child{color:var(--text);font-family:'Sora',sans-serif;font-size:12px;}
.week-row{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid #E2DAFF;font-size:13px;flex-wrap:wrap;}
.week-row:last-child{border-bottom:none;}
.row-item{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;}
.row-item:last-child{border-bottom:none;}
.spinner{width:22px;height:22px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;margin:2rem auto;}
@keyframes spin{to{transform:rotate(360deg);}}
.notice{font-size:13px;color:var(--muted);text-align:center;padding:1rem;}
.tab-bar{display:flex;border-bottom:1px solid var(--border);margin-bottom:1.25rem;flex-wrap:wrap;}
.week-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;}
.week-nav span{font-size:13px;font-weight:500;color:var(--text);}
.hero-card{background:#FFFFFF;border:1px solid #E2DAFF;border-radius:var(--radius);padding:1.5rem;margin-bottom:12px;text-align:center;}
</style>
</head>

<script>
const SURL='https://hdjujofjpyzkzzhwaegb.supabase.co';
const SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhkanVqb2ZqcHl6a3p6aHdhZWdiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNzI5NTksImV4cCI6MjA5MTg0ODk1OX0.bVvDP_d9dALvlvVnbuACftXlp4UEiYt_peU4hudFNTc';
const MPIN='5050';

async function db(method,table,body,params){
  const url=new URL(SURL+'/rest/v1/'+table);
  if(params)Object.entries(params).forEach(([k,v])=>url.searchParams.set(k,v));
  const res=await fetch(url,{method,headers:{'apikey':SKEY,'Authorization':'Bearer '+SKEY,'Content-Type':'application/json','Prefer':method==='POST'?'return=representation':'return=minimal'},body:body?JSON.stringify(body):undefined});
  if(!res.ok){const e=await res.json();throw new Error(e.message||'DB error');}
  try{return await res.json();}catch{return null;}
}

const getAgents=()=>db('GET','agents',null,{select:'*',order:'name.asc'});
const getPunches=id=>db('GET','punches',null,{select:'*',agent_id:'eq.'+id,order:'punched_at.desc',limit:'100'});
const addPunch=(id,type)=>db('POST','punches',{agent_id:id,type,punched_at:new Date().toISOString()});
const addPunchAt=(id,type,ts)=>db('POST','punches',{agent_id:id,type,punched_at:ts});
const delPunch=id=>db('DELETE','punches',null,{id:'eq.'+id});
const setPin=(id,pin)=>db('PATCH','agents',{pin},{id:'eq.'+id});
const getTO=id=>db('GET','time_off',null,{select:'*',agent_id:'eq.'+id,order:'date.desc',limit:'50'});
const addTO=(agent_id,date,type,hours,note)=>db('POST','time_off',{agent_id,date,type,hours,note});
const delTO=id=>db('DELETE','time_off',null,{id:'eq.'+id});

function getWeekRange(offset){
  const now=new Date(),day=now.getDay();
  const sun=new Date(now);sun.setDate(now.getDate()-day+offset*7);sun.setHours(0,0,0,0);
  const sat=new Date(sun);sat.setDate(sun.getDate()+6);sat.setHours(23,59,59,999);
  return{start:sun,end:sat};
}

const COLORS=[
  {bg:'#2D1B69',text:'#C4B5FD'},
  {bg:'#1E3A5F',text:'#93C5FD'},
  {bg:'#1A3A2A',text:'#6EE7B7'},
  {bg:'#3B1F2B',text:'#F9A8D4'},
  {bg:'#2D2A1A',text:'#FDE68A'},
  {bg:'#1F2937',text:'#9CA3AF'}
];
const initials=n=>n.trim().split(/\s+/).map(w=>w[0]).join('').toUpperCase().slice(0,2);
const clr=i=>COLORS[i%COLORS.length];
const fmtT=ts=>new Date(ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
const fmtD=ts=>new Date(ts).toLocaleDateString([],{weekday:'short',month:'short',day:'numeric'});
const fmtDur=ms=>{const h=Math.floor(ms/3600000),m=Math.floor((ms%3600000)/60000);return h>0?h+'h '+m+'m':m+'m';};
const toLDT=ts=>{const d=new Date(ts);return new Date(d.getTime()-d.getTimezoneOffset()*60000).toISOString().slice(0,16);};
const todayStr=()=>new Date().toISOString().slice(0,10);
const dots=(n,e)=>Array.from({length:n},(_,i)=>'<div class="pin-dot'+(i<e.length?' filled':'')+'"></div>').join('');
const numpad=attr=>[1,2,3,4,5,6,7,8,9,null,0,'⌫'].map(k=>k===null?'<button class="pinkey" style="visibility:hidden" disabled></button>':'<button class="pinkey" '+attr+'="'+k+'">'+k+'</button>').join('');
const TOLAB={pto:'PTO',sick:'Sick',holiday:'Holiday'};
const TOBADGE={pto:'badge-pto',sick:'badge-sick',holiday:'badge-holiday'};

function status(p){if(!p||!p.length)return'out';const l=p[0];if(l.type==='shift_in')return'in';if(l.type==='lunch_out')return'lunch';if(l.type==='lunch_in')return'in';return'out';}
function statusLabel(s){if(s==='in')return['In','badge-in'];if(s==='lunch')return['On lunch','badge-lunch'];return['Out','badge-out'];}
function actions(s){if(s==='out')return[['shift_in','Clock in for shift','btn-primary']];if(s==='in')return[['lunch_out','Start lunch','btn-sm btn-ghost'],['shift_out','Clock out','btn-danger']];if(s==='lunch')return[['lunch_in','End lunch','btn-primary'],['shift_out','Clock out','btn-danger']];return[];}
function tabSty(t){return 'padding:9px 14px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:none;color:'+(mgrTab===t?'var(--text)':'var(--muted)')+';border-bottom:2px solid '+(mgrTab===t?'var(--accent)':'transparent')+';margin-bottom:-1px;font-family:Inter,sans-serif;';}

let view='home',agents=[],selAgent=null,pinE='',pinErr='',mgrE='',mgrErr='',aPunches=[],wPunches=[],wTO=[],loading=false,mgrTab='team',wkOffset=0;
let cpStep='current',cpNew='',cpE='',cpErr='',cpOk='';
let editAgent=null,editPunches=[],editMsg='';
let toAgent=null,toList=[],toMsg='';

function render(){
  document.getElementById('app').innerHTML={
    home:rHome,select:rSelect,pin:rPin,agent:rAgent,'change-pin':rChangePin,
    'mgr-pin':rMgrPin,mgr:rMgr,'edit-punches':rEditPunches,'time-off':rTimeOff
  }[view]();
  updateClock();
}

function rHome(){
  return '<div class="hero-card"><div class="time-display" id="lt" style="color:#26045E;margin-bottom:4px"></div><div style="font-size:12px;color:#7B6FA8;letter-spacing:0.05em" id="ld"></div></div><div style="display:flex;flex-direction:column;gap:10px"><button class="btn btn-primary btn-full" id="b-ci" style="font-size:16px;padding:16px;font-family:Sora,sans-serif;font-weight:600;letter-spacing:0.02em;color:#fff">Clock in / out</button><button class="btn btn-full btn-ghost" id="b-mv">Manager view</button></div>';
}

function rSelect(){
  if(loading)return '<div class="spinner"></div>';
  const rows=agents.length===0?'<p class="notice">No agents yet.</p>':agents.map((a,i)=>{const c=clr(i);const[lb,cls]=statusLabel(status(a._p));return '<div class="agent-row" data-aid="'+a.id+'"><div class="avatar" style="background:'+c.bg+';color:'+c.text+'">'+initials(a.name)+'</div><div style="flex:1"><div style="font-size:15px;font-weight:500">'+a.name+'</div></div><span class="badge '+cls+'">'+lb+'</span></div>';}).join('');
  return '<button class="btn btn-ghost btn-sm" id="b-back">← Back</button><div class="card" style="margin-top:12px"><div class="card-title">Who are you?</div>'+rows+'</div>';
}

function rPin(){
  const a=selAgent,c=clr(agents.findIndex(x=>x.id===a.id));
  const[lb,cls]=statusLabel(status(aPunches));

  const co=e.target.closest('[data-cpold]');
  if(co){const k=co.dataset.cpold;if(k==='⌫')cpE=cpE.slice(0,-1);else if(cpE.length<4)cpE+=k;document.getElementById('cpd').innerHTML=dots(4,cpE);if(cpE.length===4){if(cpE===selAgent.pin){cpE='';cpErr='';cpStep='new';render();}else{cpErr='Incorrect PIN.';cpE='';document.getElementById('cpd').innerHTML=dots(4,'');document.getElementById('cpe').textContent=cpErr;}}return;}
  const cn=e.target.closest('[data-cpnew]');

  const toB=e.target.closest('[data-tob]');
  if(toB){toAgent=agents.find(a=>a.id===Number(toB.dataset.tob));toList=await getTO(toAgent.id)||[];toMsg='';view='time-off';render();return;}
  const dtoB=e.target.closest('[data-dto]');

  else if(bid==='b-ap'){const type=document.getElementById('apt').value;const val=document.getElementById('apdt').value;if(!val){editMsg='Pick a time.';render();return;}try{await addPunchAt(editAgent.id,type,new Date(val).toISOString());editPunches=await getPunches(editAgent.id);editMsg='Added!';}catch(ex){editMsg='Error: '+ex.message;}render();}

  else if(bid==='b-export'){exportCSV();}
});

async function loadAgents(){try{agents=await getAgents();await Promise.all(agents.map(async a=>{a._p=await getPunches(a.id);}));}catch(e){alert('Could not load: '+e.message);}}

async function loadWeek(){
  loading=true;render();
  const{start,end}=getWeekRange(wkOffset);
  try{
    wPunches=await db('GET','punches',null,{select:'*,agents(name)',punched_at:'gte.'+start.toISOString(),'and':'(punched_at.lte.'+end.toISOString()+')',order:'punched_at.asc'})||[];
    wTO=await db('GET','time_off',null,{select:'*,agents(name)',date:'gte.'+start.toISOString().slice(0,10),'and':'(date.lte.'+end.toISOString().slice(0,10)+')',order:'date.asc'})||[];
  }catch(e){wPunches=[];wTO=[];}
  loading=false;
}

function exportCSV(){
  const{start}=getWeekRange(wkOffset);
  const wk=start.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  const grouped={};agents.forEach(a=>grouped[a.id]={name:a.name,tz:a.timezone||'',events:[],to:[]});
  wPunches.forEach(p=>{if(grouped[p.agent_id])grouped[p.agent_id].events.push(p);});
  wTO.forEach(t=>{if(grouped[t.agent_id])grouped[t.agent_id].to.push(t);});
  let csv='Agent,Timezone,Date,Shift Start,Shift End,Lunch Start,Lunch End,Hours Worked,Lunch Duration,Time Off Type,Time Off Hours,Note\n';
  Object.values(grouped).forEach(g=>{
    if(!g.events.length&&!g.to.length)return;
    let wkTotal=0,toTotal=0;
    const byDay={};
    g.events.forEach(p=>{const day=new Date(p.punched_at).toLocaleDateString();if(!byDay[day])byDay[day]={punches:[],to:[]};byDay[day].punches.push(p);});
    g.to.forEach(t=>{const day=new Date(t.date+'T12:00:00').toLocaleDateString();if(!byDay[day])byDay[day]={punches:[],to:[]};byDay[day].to.push(t);});
    Object.entries(byDay).forEach(([day,data])=>{
      let si=null,so=null,lo=null,li=null;
      data.punches.forEach(p=>{if(p.type==='shift_in')si=new Date(p.punched_at);if(p.type==='shift_out')so=new Date(p.punched_at);if(p.type==='lunch_out')lo=new Date(p.punched_at);if(p.type==='lunch_in')li=new Date(p.punched_at);});
      const lMs=(lo&&li)?li-lo:0,sMs=(si&&so)?so-si:0,wMs=sMs-lMs;
      wkTotal+=wMs;
      const toH=data.to.reduce((s,t)=>s+Number(t.hours),0)||'';
      toTotal+=Number(toH)||0;
      const fmt=t=>t?t.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}):'';
      const hrs=ms=>ms>0?(ms/3600000).toFixed(2):'';
      csv+='"'+g.name+'","'+(g.tz||'')+('","')+day+'","'+fmt(si)+'","'+fmt(so)+'","'+fmt(lo)+'","'+fmt(li)+'","'+hrs(wMs)+'","'+hrs(lMs)+'","'+data.to.map(t=>TOLAB[t.type]).join(', ')+'","'+toH+'","'+data.to.map(t=>t.note).filter(Boolean).join(', ')+'"\n';
    });
    csv+='"'+g.name+' — WEEKLY TOTAL","'+(g.tz||'')+'","","","","","'+(wkTotal/3600000).toFixed(2)+'","","","'+(toTotal||'')+'",""\n';
    csv+='"","","","","","","","","","",""\n';
  });
  const link=document.createElement('a');
  link.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  link.download='nymbl_timeclock_'+wk.replace(' ','_')+'.csv';
  link.click();
}

function updateClock(){
  const now=new Date();
  const t=document.getElementById('lt');
  const d=document.getElementById('ld');
  const ld=document.getElementById('live-date');
  if(t)t.textContent=now.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  if(d)d.textContent=now.toLocaleDateString([],{weekday:'long',month:'long',day:'numeric'});
  if(ld)ld.textContent=now.toLocaleDateString([],{weekday:'long',month:'long',day:'numeric'});
}
setInterval(updateClock,1000);
render();
</script>
