<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nymbl Systems Support — Timeclock</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07051E;
  --surface:#0F0D2E;
  --surface2:#16133A;
  --border:#2A2650;
  --text:#F7F7F7;
  --muted:#8B87B0;
  --accent:#7748FF;
  --accent-dark:#26045E;
  --accent-light:rgba(119,72,255,0.15);
  --danger:#FF5959;
  --danger-light:rgba(255,89,89,0.12);
  --warn:#F59E0B;
  --warn-light:rgba(245,158,11,0.12);
  --radius:14px;
  --radius-sm:10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2rem 1rem;}
.container{width:100%;max-width:420px;}
.logo-wrap{text-align:center;margin-bottom:2rem;padding-top:0.5rem;}
.logo-wrap img{height:68px;width:auto;}
.logo-wrap .sub{font-size:11px;color:var(--muted);margin-top:6px;letter-spacing:0.08em;text-transform:uppercase;font-family:'Inter',sans-serif;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;margin-bottom:12px;}
.card-title{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:1rem;}
input,select{width:100%;padding:11px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:'Inter',sans-serif;font-size:15px;background:var(--surface2);color:var(--text);outline:none;transition:border-color 0.15s;}
input:focus,select:focus{border-color:var(--accent);}
input::placeholder{color:var(--muted);}
select option{background:var(--surface2);}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:11px 20px;border-radius:var(--radius-sm);font-family:'Inter',sans-serif;font-size:14px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text);transition:all 0.15s;white-space:nowrap;}
.btn:hover{background:var(--surface2);}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff;}
.btn-primary:hover{background:#6535ee;border-color:#6535ee;}
.btn-danger{background:var(--danger);border-color:var(--danger);color:#fff;}
.btn-danger:hover{opacity:0.88;}
.btn-full{width:100%;padding:14px;font-size:15px;}
.btn-sm{padding:6px 12px;font-size:12px;}
.btn-ghost{border-color:transparent;background:transparent;color:var(--muted);}
.btn-ghost:hover{color:var(--text);background:var(--surface2);}
.badge{display:inline-block;font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;letter-spacing:0.02em;}
.badge-in{background:rgba(119,72,255,0.2);color:#A78BFF;}
.badge-lunch{background:var(--warn-light);color:var(--warn);}
.badge-out{background:rgba(139,135,176,0.15);color:var(--muted);}
.badge-pto{background:rgba(56,189,248,0.15);color:#38BDF8;}
.badge-sick{background:var(--danger-light);color:#FF8080;}
.badge-holiday{background:rgba(52,211,153,0.15);color:#34D399;}
.agent-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:opacity 0.12s;}
.agent-row:last-child{border-bottom:none;}
.agent-row:hover{opacity:0.7;}
.avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0;font-family:'Sora',sans-serif;}
.pinpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:240px;margin:0 auto;}
.pinkey{height:58px;font-size:22px;font-family:'Sora',sans-serif;font-weight:600;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface2);color:var(--text);cursor:pointer;transition:background 0.1s,transform 0.08s;}
.pinkey:hover{background:#1E1A4A;}
.pinkey:active{transform:scale(0.94);}
.pin-dots{display:flex;gap:14px;justify-content:center;margin:1.25rem 0;}
.pin-dot{width:12px;height:12px;border-radius:50%;border:2px solid var(--border);transition:all 0.15s;}
.pin-dot.filled{background:var(--accent);border-color:var(--accent);}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.25rem;}
.stat{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 12px;text-align:center;}
.stat-val{font-size:24px;font-weight:700;font-family:'Sora',sans-serif;color:var(--text);}
.stat-label{font-size:10px;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:0.07em;}
.err{color:var(--danger);font-size:13px;text-align:center;min-height:18px;margin-top:8px;}
.ok{color:#34D399;font-size:13px;text-align:center;min-height:18px;margin-top:8px;}
.time-display{font-family:'Sora',sans-serif;font-size:42px;font-weight:700;text-align:center;letter-spacing:-1px;margin:0.5rem 0;color:var(--text);}
.punch-row{display:flex;justify-content:space-between;align-items:center;font-size:13px;padding:7px 0;border-bottom:1px solid var(--border);color:var(--muted);}
.punch-row:last-child{border-bottom:none;}
.punch-row span:last-child{color:var(--text);font-family:'Sora',sans-serif;font-size:12px;}
.week-row{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--border);font-size:13px;flex-wrap:wrap;}
.week-row:last-child{border-bottom:none;}
.row-item{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;}
.row-item:last-child{border-bottom:none;}
.spinner{width:22px;height:22px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;margin:2rem auto;}
@keyframes spin{to{transform:rotate(360deg);}}
.notice{font-size:13px;color:var(--muted);text-align:center;padding:1rem;}
.tab-bar{display:flex;border-bottom:1px solid var(--border);margin-bottom:1.25rem;flex-wrap:wrap;}
.week-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;}
.week-nav span{font-size:13px;font-weight:500;color:var(--text);}
.hero-card{background:linear-gradient(135deg,var(--accent-dark) 0%,#1a0f3e 100%);border:1px solid var(--accent);border-radius:var(--radius);padding:1.5rem;margin-bottom:12px;text-align:center;}
</style>
</head>

async function db(method,table,body,params){
  const url=new URL(SURL+'/rest/v1/'+table);
  if(params)Object.entries(params).forEach(([k,v])=>url.searchParams.set(k,v));
  const res=await fetch(url,{method,headers:{'apikey':SKEY,'Authorization':'Bearer '+SKEY,'Content-Type':'application/json','Prefer':method==='POST'?'return=representation':'return=minimal'},body:body?JSON.stringify(body):undefined});
  if(!res.ok){const e=await res.json();throw new Error(e.message||'DB error');}
  try{return await res.json();}catch{return null;}
}

function getWeekRange(offset){
  const now=new Date(),day=now.getDay();
  const sun=new Date(now);sun.setDate(now.getDate()-day+offset*7);sun.setHours(0,0,0,0);
  const sat=new Date(sun);sat.setDate(sun.getDate()+6);sat.setHours(23,59,59,999);
  return{start:sun,end:sat};
}

}

function rMgrPin(){
  return '<button class="btn btn-ghost btn-sm" id="b-back">← Back</button><div class="card" style="text-align:center;margin-top:12px"><div style="font-size:18px;font-weight:700;font-family:Sora,sans-serif;margin-bottom:4px">Manager access</div><div style="font-size:13px;color:var(--muted)">Enter your PIN to continue</div><div class="pin-dots" id="md">'+dots(4,mgrE)+'</div><div class="pinpad">'+numpad('data-mpin')+'</div><div class="err" id="me">'+mgrErr+'</div></div>';
}

function rMgr(){
  const active=agents.filter(a=>status(a._p)!=='out').length;
  const tabs='<div class="tab-bar"><button class="btn-tab" data-tab="team" style="'+tabSty('team')+'">Team</button><button class="btn-tab" data-tab="week" style="'+tabSty('week')+'">Reports</button><button class="btn-tab" data-tab="agents" style="'+tabSty('agents')+'">Agents</button><button class="btn btn-ghost btn-sm" id="b-exit" style="margin-left:auto;align-self:center">Exit</button></div>';

  if(mgrTab==='team'){
    const rows=agents.length===0?'<p class="notice">No agents yet.</p>':agents.map((a,i)=>{const c=clr(i);const[lb,cls]=statusLabel(status(a._p));const lp=a._p&&a._p[0];return '<div class="week-row"><div class="avatar" style="background:'+c.bg+';color:'+c.text+'">'+initials(a.name)+'</div><div style="flex:1"><div style="font-weight:500">'+a.name+'</div>'+(lp?'<div style="font-size:11px;color:var(--muted)">'+fmtD(lp.punched_at)+' · '+fmtT(lp.punched_at)+'</div>':'')+'</div><span class="badge '+cls+'">'+lb+'</span></div>';}).join('');
    return tabs+'<div class="stat-grid"><div class="stat"><div class="stat-val">'+agents.length+'</div><div class="stat-label">Agents</div></div><div class="stat"><div class="stat-val" style="color:#A78BFF">'+active+'</div><div class="stat-label">Clocked in</div></div><div class="stat"><div class="stat-val">'+(agents.length-active)+'</div><div class="stat-label">Off</div></div></div><div class="card">'+rows+'</div>';
  }

  if(mgrTab==='week'){
    if(loading)return tabs+'<div class="spinner"></div>';
    const{start,end}=getWeekRange(wkOffset);
    const fmt=d=>d.toLocaleDateString([],{month:'short',day:'numeric'});
    const nav='<div class="week-nav"><button class="btn btn-sm btn-ghost" id="b-wp">← Prev</button><span>'+fmt(start)+' – '+fmt(end)+'</span><button class="btn btn-sm btn-ghost" id="b-wn"'+(wkOffset===0?' disabled style="opacity:0.3"':'')+'>Next →</button></div>';
    const grouped={};agents.forEach(a=>grouped[a.id]={name:a.name,ci:agents.findIndex(x=>x.id===a.id),punches:[],to:[]});
    wPunches.forEach(p=>{if(grouped[p.agent_id])grouped[p.agent_id].punches.push(p);});
    wTO.forEach(t=>{if(grouped[t.agent_id])grouped[t.agent_id].to.push(t);});
    const rows=Object.values(grouped).map(g=>{
      if(!g.punches.length&&!g.to.length)return'';
      let sMs=0,lMs=0,sS=null,lS=null;
      g.punches.forEach(p=>{if(p.type==='shift_in')sS=new Date(p.punched_at);if(p.type==='shift_out'&&sS){sMs+=new Date(p.punched_at)-sS;sS=null;}if(p.type==='lunch_out')lS=new Date(p.punched_at);if(p.type==='lunch_in'&&lS){lMs+=new Date(p.punched_at)-lS;lS=null;}});
      const wMs=sMs-lMs,toH=g.to.reduce((s,t)=>s+Number(t.hours),0);
      const toBadges=g.to.map(t=>'<span class="badge '+(TOBADGE[t.type]||'badge-out')+'" style="margin-right:3px">'+TOLAB[t.type]+' '+t.hours+'h</span>').join('');
      const c=clr(g.ci);
      return '<div class="week-row"><div class="avatar" style="background:'+c.bg+';color:'+c.text+';flex-shrink:0">'+initials(g.name)+'</div><div style="flex:1;min-width:100px"><div style="font-weight:500">'+g.name+'</div>'+(toBadges?'<div style="margin-top:3px">'+toBadges+'</div>':'')+'</div><div style="text-align:right;font-size:13px"><div style="font-weight:600;font-family:Sora,sans-serif">'+fmtDur(wMs)+'</div>'+(toH?'<div style="color:var(--muted);font-size:11px">+'+toH+'h off</div>':'')+'</div></div>';
    }).filter(Boolean).join('')||'<p class="notice">No data for this week.</p>';
    return tabs+nav+'<div class="card">'+rows+'</div><button class="btn btn-primary btn-full" id="b-export" style="margin-top:4px">Export CSV for HR</button>';
  }

  if(mgrTab==='agents'){
    const rows=agents.length===0?'<p class="notice">No agents yet.</p>':agents.map((a,i)=>{const c=clr(i);return '<div class="week-row"><div class="avatar" style="background:'+c.bg+';color:'+c.text+'">'+initials(a.name)+'</div><div style="flex:1;font-weight:500;min-width:80px">'+a.name+'</div><div style="display:flex;gap:5px;flex-wrap:wrap"><button class="btn btn-sm" data-rpin="'+a.id+'" style="font-size:11px">Reset PIN</button><button class="btn btn-sm" data-tob="'+a.id+'" style="font-size:11px">Time off</button><button class="btn btn-sm" data-epb="'+a.id+'" style="font-size:11px">Punches</button><button class="btn btn-sm" data-rid="'+a.id+'" style="color:var(--danger);border-color:var(--danger);font-size:11px">Remove</button></div></div>';}).join('');
    return tabs+'<div class="card" style="margin-bottom:12px"><div class="card-title">Add agent</div><div style="display:flex;flex-direction:column;gap:8px"><input type="text" id="nn" placeholder="Full name" /><input type="password" id="np" placeholder="4-digit PIN" maxlength="4" /><button class="btn btn-primary" id="b-add">Add agent</button></div><div class="err" id="ae"></div></div><div class="card">'+rows+'</div>';
  }
}

function rEditPunches(){
  const a=editAgent,c=clr(agents.findIndex(x=>x.id===a.id));
  const PL={shift_in:'Shift In',shift_out:'Shift Out',lunch_out:'Lunch Out',lunch_in:'Lunch In'};
  const rows=editPunches.slice(0,20).map(p=>'<div class="row-item"><div style="flex:1"><div style="font-weight:500">'+PL[p.type]+'</div><div style="font-size:11px;color:var(--muted)">'+fmtD(p.punched_at)+' · '+fmtT(p.punched_at)+'</div></div><button class="btn btn-sm" style="color:var(--danger);border-color:var(--danger)" data-dp="'+p.id+'">Delete</button></div>').join('')||'<p class="notice">No punches.</p>';
  return '<button class="btn btn-ghost btn-sm" id="b-back">← Back</button><div class="card" style="margin-top:12px"><div style="display:flex;align-items:center;gap:10px;margin-bottom:1rem"><div class="avatar" style="background:'+c.bg+';color:'+c.text+'">'+initials(a.name)+'</div><div style="font-size:16px;font-weight:600;font-family:Sora,sans-serif">'+a.name+'</div></div><div class="card-title">Add a punch</div><div style="display:flex;flex-direction:column;gap:8px;margin-bottom:1rem"><select id="apt"><option value="shift_in">Shift In</option><option value="shift_out">Shift Out</option><option value="lunch_out">Lunch Out</option><option value="lunch_in">Lunch In</option></select><input type="datetime-local" id="apdt" value="'+toLDT(new Date())+'" /><button class="btn btn-primary" id="b-ap">Add punch</button></div><div class="ok" id="em">'+editMsg+'</div></div><div class="card"><div class="card-title">Recent punches</div>'+rows+'</div>';
}

function rTimeOff(){
  const a=toAgent,c=clr(agents.findIndex(x=>x.id===a.id));
  const rows=toList.slice(0,30).map(t=>'<div class="row-item"><div style="flex:1"><span class="badge '+(TOBADGE[t.type]||'badge-out')+'" style="margin-right:6px">'+TOLAB[t.type]+'</span><span style="font-weight:500">'+t.date+'</span>'+(t.note?' <span style="color:var(--muted);font-size:12px">· '+t.note+'</span>':'')+'</div><div style="font-size:13px;font-weight:500;margin-right:8px">'+t.hours+'h</div><button class="btn btn-sm" style="color:var(--danger);border-color:var(--danger)" data-dto="'+t.id+'">Delete</button></div>').join('')||'<p class="notice">No time off recorded.</p>';
  return '<button class="btn btn-ghost btn-sm" id="b-back">← Back</button><div class="card" style="margin-top:12px"><div style="display:flex;align-items:center;gap:10px;margin-bottom:1rem"><div class="avatar" style="background:'+c.bg+';color:'+c.text+'">'+initials(a.name)+'</div><div style="font-size:16px;font-weight:600;font-family:Sora,sans-serif">'+a.name+'</div></div><div class="card-title">Add time off</div><div style="display:flex;flex-direction:column;gap:8px;margin-bottom:1rem"><select id="tot"><option value="pto">PTO</option><option value="sick">Sick Day</option><option value="holiday">Company Holiday</option></select><input type="date" id="tod" value="'+todayStr()+'" /><input type="number" id="toh" placeholder="Hours (e.g. 8)" min="1" max="24" value="8" /><input type="text" id="ton" placeholder="Note (optional)" /><button class="btn btn-primary" id="b-ato">Add time off</button></div><div class="ok" id="tom">'+toMsg+'</div></div><div class="card"><div class="card-title">Time off history</div>'+rows+'</div>';
}

document.getElementById('app').addEventListener('click',async e=>{
  const pb=e.target.closest('[data-pin]');
  if(pb){const k=pb.dataset.pin;if(k==='⌫')pinE=pinE.slice(0,-1);else if(pinE.length<4)pinE+=k;document.getElementById('pd').innerHTML=dots(4,pinE);if(pinE.length===4){if(pinE===selAgent.pin){pinE='';pinErr='';view='agent';render();}else{pinErr='Incorrect PIN.';pinE='';document.getElementById('pd').innerHTML=dots(4,'');document.getElementById('pe').textContent=pinErr;}}return;}
  const mb=e.target.closest('[data-mpin]');
  if(mb){const k=mb.dataset.mpin;if(k==='⌫')mgrE=mgrE.slice(0,-1);else if(mgrE.length<4)mgrE+=k;document.getElementById('md').innerHTML=dots(4,mgrE);if(mgrE.length===4){if(mgrE===MPIN){mgrE='';mgrErr='';await loadAgents();view='mgr';render();}else{mgrErr='Incorrect PIN.';mgrE='';document.getElementById('md').innerHTML=dots(4,'');document.getElementById('me').textContent=mgrErr;}}return;}
  const co=e.target.closest('[data-cpold]');
  if(co){const k=co.dataset.cpold;if(k==='⌫')cpE=cpE.slice(0,-1);else if(cpE.length<4)cpE+=k;document.getElementById('cpd').innerHTML=dots(4,cpE);if(cpE.length===4){if(cpE===selAgent.pin){cpE='';cpErr='';cpStep='new';render();}else{cpErr='Incorrect PIN.';cpE='';document.getElementById('cpd').innerHTML=dots(4,'');document.getElementById('cpe').textContent=cpErr;}}return;}
  const cn=e.target.closest('[data-cpnew]');
  if(cn){const k=cn.dataset.cpnew;if(k==='⌫')cpE=cpE.slice(0,-1);else if(cpE.length<4)cpE+=k;document.getElementById('cpd').innerHTML=dots(4,cpE);if(cpE.length===4){cpNew=cpE;cpE='';cpStep='confirm';render();}return;}
  const cc=e.target.closest('[data-cpconf]');
  if(cc){const k=cc.dataset.cpconf;if(k==='⌫')cpE=cpE.slice(0,-1);else if(cpE.length<4)cpE+=k;document.getElementById('cpd').innerHTML=dots(4,cpE);if(cpE.length===4){if(cpE===cpNew){try{await setPin(selAgent.id,cpNew);selAgent.pin=cpNew;await loadAgents();cpOk='PIN updated!';cpErr='';cpE='';cpStep='current';render();setTimeout(()=>{view='agent';render();},1500);}catch(ex){cpErr='Error.';cpE='';document.getElementById('cpd').innerHTML=dots(4,'');document.getElementById('cpe').textContent=cpErr;}}else{cpErr='PINs do not match.';cpE='';cpNew='';cpStep='new';render();}}return;}
  const punchB=e.target.closest('[data-punch]');
  if(punchB){loading=true;render();try{await addPunch(selAgent.id,punchB.dataset.punch);aPunches=await getPunches(selAgent.id);await loadAgents();}catch(err){alert('Error: '+err.message);}loading=false;render();return;}
  const tabB=e.target.closest('[data-tab]');
  if(tabB){mgrTab=tabB.dataset.tab;if(mgrTab==='week')await loadWeek();render();return;}
  const ridB=e.target.closest('[data-rid]');
  if(ridB){if(!confirm('Remove this agent?'))return;await db('DELETE','agents',null,{id:'eq.'+ridB.dataset.rid});await loadAgents();render();return;}
  const rpB=e.target.closest('[data-rpin]');
  if(rpB){const p=prompt('New 4-digit PIN:');if(!p)return;if(!/^\d{4}$/.test(p)){alert('Must be 4 digits.');return;}try{await setPin(rpB.dataset.rpin,p);await loadAgents();alert('PIN reset!');}catch(ex){alert('Error: '+ex.message);}return;}
  const epB=e.target.closest('[data-epb]');
  if(epB){editAgent=agents.find(a=>a.id===Number(epB.dataset.epb));editPunches=await getPunches(editAgent.id);editMsg='';view='edit-punches';render();return;}
  const dpB=e.target.closest('[data-dp]');
  if(dpB){if(!confirm('Delete this punch?'))return;try{await delPunch(dpB.dataset.dp);editPunches=await getPunches(editAgent.id);editMsg='Deleted.';render();}catch(ex){alert('Error: '+ex.message);}return;}
  const toB=e.target.closest('[data-tob]');
  if(toB){toAgent=agents.find(a=>a.id===Number(toB.dataset.tob));toList=await getTO(toAgent.id)||[];toMsg='';view='time-off';render();return;}
  const dtoB=e.target.closest('[data-dto]');
  if(dtoB){if(!confirm('Delete this entry?'))return;try{await delTO(dtoB.dataset.dto);toList=await getTO(toAgent.id)||[];toMsg='Deleted.';render();}catch(ex){alert('Error: '+ex.message);}return;}
  const aRow=e.target.closest('[data-aid]');
  if(aRow&&view==='select'){selAgent=agents.find(a=>a.id==aRow.dataset.aid);aPunches=selAgent._p||[];pinE='';pinErr='';view='pin';render();return;}
  const bid=e.target.id||e.target.closest('button')?.id;
  if(bid==='b-ci'){loading=true;render();await loadAgents();view='select';loading=false;render();}
  else if(bid==='b-mv'){mgrE='';mgrErr='';view='mgr-pin';render();}
  else if(bid==='b-back'){if(view==='change-pin'){cpStep='current';cpE='';cpErr='';cpOk='';view='agent';}else if(view==='edit-punches'||view==='time-off'){view='mgr';mgrTab='agents';}else if(view==='pin')view='select';else if(view==='select')view='home';else view='home';render();}
  else if(bid==='b-done'||bid==='b-exit'){view='home';render();}
  else if(bid==='b-cp'){cpStep='current';cpE='';cpErr='';cpOk='';view='change-pin';render();}
  else if(bid==='b-wp'){wkOffset--;await loadWeek();render();}
  else if(bid==='b-wn'){if(wkOffset<0){wkOffset++;await loadWeek();render();}}
  else if(bid==='b-add'){const name=document.getElementById('nn').value.trim();const pin=document.getElementById('np').value.trim();const err=document.getElementById('ae');if(!name){err.textContent='Enter a name.';return;}if(!/^\d{4}$/.test(pin)){err.textContent='PIN must be 4 digits.';return;}try{await db('POST','agents',{name,pin});await loadAgents();render();}catch(ex){err.textContent=ex.message;}}
  else if(bid==='b-ap'){const type=document.getElementById('apt').value;const val=document.getElementById('apdt').value;if(!val){editMsg='Pick a time.';render();return;}try{await addPunchAt(editAgent.id,type,new Date(val).toISOString());editPunches=await getPunches(editAgent.id);editMsg='Added!';}catch(ex){editMsg='Error: '+ex.message;}render();}
  else if(bid==='b-ato'){const type=document.getElementById('tot').value;const date=document.getElementById('tod').value;const hours=document.getElementById('toh').value;const note=document.getElementById('ton').value.trim();if(!date||!hours){toMsg='Fill in date and hours.';render();return;}try{await addTO(toAgent.id,date,type,Number(hours),note);toList=await getTO(toAgent.id)||[];toMsg='Added!';}catch(ex){toMsg='Error: '+ex.message;}render();}
  else if(bid==='b-export'){exportCSV();}
});

async function loadAgents(){try{agents=await getAgents();await Promise.all(agents.map(async a=>{a._p=await getPunches(a.id);}));}catch(e){alert('Could not load: '+e.message);}}

async function loadWeek(){
  loading=true;render();
  const{start,end}=getWeekRange(wkOffset);
  try{
    wPunches=await db('GET','punches',null,{select:'*,agents(name)',punched_at:'gte.'+start.toISOString(),'and':'(punched_at.lte.'+end.toISOString()+')',order:'punched_at.asc'})||[];
    wTO=await db('GET','time_off',null,{select:'*,agents(name)',date:'gte.'+start.toISOString().slice(0,10),'and':'(date.lte.'+end.toISOString().slice(0,10)+')',order:'date.asc'})||[];
  }catch(e){wPunches=[];wTO=[];}
  loading=false;
}

function exportCSV(){
  const{start}=getWeekRange(wkOffset);
  const wk=start.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  const grouped={};agents.forEach(a=>grouped[a.id]={name:a.name,events:[],to:[]});
  wPunches.forEach(p=>{if(grouped[p.agent_id])grouped[p.agent_id].events.push(p);});
  wTO.forEach(t=>{if(grouped[t.agent_id])grouped[t.agent_id].to.push(t);});
  let csv='Agent,Date,Shift Start,Shift End,Lunch Start,Lunch End,Hours Worked,Lunch Duration,Time Off Type,Time Off Hours,Note\n';
  Object.values(grouped).forEach(g=>{
    if(!g.events.length&&!g.to.length)return;
    let wkTotal=0,toTotal=0;
    const byDay={};
    g.events.forEach(p=>{const day=new Date(p.punched_at).toLocaleDateString();if(!byDay[day])byDay[day]={punches:[],to:[]};byDay[day].punches.push(p);});
    g.to.forEach(t=>{const day=new Date(t.date+'T12:00:00').toLocaleDateString();if(!byDay[day])byDay[day]={punches:[],to:[]};byDay[day].to.push(t);});
    Object.entries(byDay).forEach(([day,data])=>{
      let si=null,so=null,lo=null,li=null;
      data.punches.forEach(p=>{if(p.type==='shift_in')si=new Date(p.punched_at);if(p.type==='shift_out')so=new Date(p.punched_at);if(p.type==='lunch_out')lo=new Date(p.punched_at);if(p.type==='lunch_in')li=new Date(p.punched_at);});
      const lMs=(lo&&li)?li-lo:0,sMs=(si&&so)?so-si:0,wMs=sMs-lMs;
      wkTotal+=wMs;
      const toH=data.to.reduce((s,t)=>s+Number(t.hours),0)||'';
      toTotal+=Number(toH)||0;
      const fmt=t=>t?t.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}):'';
      const hrs=ms=>ms>0?(ms/3600000).toFixed(2):'';
      csv+='"'+g.name+'","'+day+'","'+fmt(si)+'","'+fmt(so)+'","'+fmt(lo)+'","'+fmt(li)+'","'+hrs(wMs)+'","'+hrs(lMs)+'","'+data.to.map(t=>TOLAB[t.type]).join(', ')+'","'+toH+'","'+data.to.map(t=>t.note).filter(Boolean).join(', ')+'"\n';
    });
    csv+='"'+g.name+' — WEEKLY TOTAL","","","","","","'+(wkTotal/3600000).toFixed(2)+'","","","'+(toTotal||'')+'",""\n';
    csv+='"","","","","","","","","","",""\n';
  });
  const link=document.createElement('a');
  link.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  link.download='nymbl_timeclock_'+wk.replace(' ','_')+'.csv';
  link.click();
}

function updateClock(){
  const now=new Date();
  const t=document.getElementById('lt');
  const d=document.getElementById('ld');
  const ld=document.getElementById('live-date');
  if(t)t.textContent=now.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  if(d)d.textContent=now.toLocaleDateString([],{weekday:'long',month:'long',day:'numeric'});
  if(ld)ld.textContent=now.toLocaleDateString([],{weekday:'long',month:'long',day:'numeric'});
}
setInterval(updateClock,1000);
render();
</script>
