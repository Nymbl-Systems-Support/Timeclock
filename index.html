<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Team Timeclock</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');
:root{--bg:#F7F6F3;--surface:#FFFFFF;--border:#E4E2DC;--text:#1A1916;--muted:#8A8880;--accent:#2D6A4F;--accent-light:#E8F5EE;--accent-text:#1B4332;--danger:#C0392B;--warn:#B7791F;--warn-light:#FEF3CD;--radius:12px;--radius-sm:8px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2rem 1rem;}
.container{width:100%;max-width:440px;}
.logo{text-align:center;margin-bottom:2rem;}
.logo h1{font-size:20px;font-weight:600;letter-spacing:-0.5px;}
.logo .sub{font-size:13px;color:var(--muted);margin-top:2px;font-family:'DM Mono',monospace;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;margin-bottom:12px;}
.card-title{font-size:13px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:1rem;}
input,select{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:15px;background:var(--bg);color:var(--text);outline:none;transition:border-color 0.15s;}
input:focus,select:focus{border-color:var(--accent);}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:10px 20px;border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text);transition:all 0.15s;white-space:nowrap;}
.btn:hover{background:var(--bg);}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff;}
.btn-primary:hover{background:var(--accent-text);}
.btn-danger{background:var(--danger);border-color:var(--danger);color:#fff;}
.btn-full{width:100%;padding:13px;font-size:15px;}
.btn-sm{padding:6px 12px;font-size:13px;}
.btn-ghost{border-color:transparent;background:transparent;color:var(--muted);}
.btn-ghost:hover{color:var(--text);background:var(--bg);}
.badge{display:inline-block;font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px;}
.badge-in{background:var(--accent-light);color:var(--accent-text);}
.badge-lunch{background:var(--warn-light);color:var(--warn);}
.badge-out{background:#F1EFE8;color:#888780;}
.badge-pto{background:#E6F1FB;color:#1A6FA8;}
.badge-sick{background:#FDECEA;color:#C0392B;}
.badge-holiday{background:#EEEDFE;color:#3C3489;}
.agent-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:opacity 0.12s;}
.agent-row:last-child{border-bottom:none;}
.agent-row:hover{opacity:0.75;}
.avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0;}
.pinpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:240px;margin:0 auto;}
.pinkey{height:56px;font-size:20px;font-family:'DM Mono',monospace;font-weight:500;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);cursor:pointer;transition:background 0.1s,transform 0.08s;}
.pinkey:hover{background:var(--bg);}
.pinkey:active{transform:scale(0.94);}
.pin-dots{display:flex;gap:12px;justify-content:center;margin:1.25rem 0;}
.pin-dot{width:11px;height:11px;border-radius:50%;border:1.5px solid var(--border);transition:all 0.15s;}
.pin-dot.filled{background:var(--text);border-color:var(--text);}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.25rem;}
.stat{background:var(--bg);border-radius:var(--radius-sm);padding:12px;text-align:center;}
.stat-val{font-size:22px;font-weight:600;}
.stat-label{font-size:11px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:0.05em;}
.err{color:var(--danger);font-size:13px;text-align:center;min-height:18px;margin-top:8px;}
.ok{color:#1D9E75;font-size:13px;text-align:center;min-height:18px;margin-top:8px;}
.time-display{font-family:'DM Mono',monospace;font-size:36px;font-weight:500;text-align:center;letter-spacing:-1px;margin:0.5rem 0;}
.punch-row{display:flex;justify-content:space-between;align-items:center;font-size:13px;padding:6px 0;border-bottom:1px solid var(--border);color:var(--muted);}
.punch-row:last-child{border-bottom:none;}
.punch-row span:last-child{color:var(--text);font-family:'DM Mono',monospace;font-size:12px;}
.week-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px;flex-wrap:wrap;}
.week-row:last-child{border-bottom:none;}
.row-item{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px;}
.row-item:last-child{border-bottom:none;}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;margin:2rem auto;}
@keyframes spin{to{transform:rotate(360deg);}}
.notice{font-size:13px;color:var(--muted);text-align:center;padding:1rem;}
.tab-bar{display:flex;border-bottom:1px solid var(--border);margin-bottom:1.25rem;flex-wrap:wrap;}
.week-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;}
.week-nav span{font-size:13px;font-weight:500;}
</style>
</head>
<body>
<div class="container">
  <div class="logo"><h1>Timeclock</h1><div class="sub" id="live-date"></div></div>
  <div id="app"></div>
</div>
<script>
const SURL='https://hdjujofjpyzkzzhwaegb.supabase.co';
const SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhkanVqb2ZqcHl6a3p6aHdhZWdiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNzI5NTksImV4cCI6MjA5MTg0ODk1OX0.bVvDP_d9dALvlvVnbuACftXlp4UEiYt_peU4hudFNTc';
const MPIN='5050';

async function db(method,table,body,params){
  const url=new URL(SURL+'/rest/v1/'+table);
  if(params)Object.entries(params).forEach(([k,v])=>url.searchParams.set(k,v));
  const res=await fetch(url,{method,headers:{'apikey':SKEY,'Authorization':'Bearer '+SKEY,'Content-Type':'application/json','Prefer':method==='POST'?'return=representation':'return=minimal'},body:body?JSON.stringify(body):undefined});
  if(!res.ok){const e=await res.json();throw new Error(e.message||'DB error');}
  try{return await res.json();}catch{return null;}
}

const getAgents=()=>db('GET','agents',null,{select:'*',order:'name.asc'});
const getPunches=id=>db('GET','punches',null,{select:'*',agent_id:'eq.'+id,order:'punched_at.desc',limit:'100'});
const addPunch=(id,type)=>db('POST','punches',{agent_id:id,type,punched_at:new Date().toISOString()});
const addPunchAt=(id,type,ts)=>db('POST','punches',{agent_id:id,type,punched_at:ts});
const delPunch=id=>db('DELETE','punches',null,{id:'eq.'+id});
const setPin=(id,pin)=>db('PATCH','agents',{pin},{id:'eq.'+id});
const getTO=id=>db('GET','time_off',null,{select:'*',agent_id:'eq.'+id,order:'date.desc',limit:'50'});
const addTO=(agent_id,date,type,hours,note)=>db('POST','time_off',{agent_id,date,type,hours,note});
const delTO=id=>db('DELETE','time_off',null,{id:'eq.'+id});

function getWeekRange(offset){
  const now=new Date(),day=now.getDay();
  const sun=new Date(now);sun.setDate(now.getDate()-day+offset*7);sun.setHours(0,0,0,0);
  const sat=new Date(sun);sat.setDate(sun.getDate()+6);sat.setHours(23,59,59,999);
  return{start:sun,end:sat};
}

const COLORS=[{bg:'#E6F1FB',text:'#0C447C'},{bg:'#E1F5EE',text:'#085041'},{bg:'#EEEDFE',text:'#3C3489'},{bg:'#FAEEDA',text:'#633806'},{bg:'#FBEAF0',text:'#72243E'},{bg:'#FAECE7',text:'#712B13'}];
const initials=n=>n.trim().split(/\s+/).map(w=>w[0]).join('').toUpperCase().slice(0,2);
const clr=i=>COLORS[i%COLORS.length];
const fmtT=ts=>new Date(ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
const fmtD=ts=>new Date(ts).toLocaleDateString([],{weekday:'short',month:'short',day:'numeric'});
const fmtDur=ms=>{const h=Math.floor(ms/3600000),m=Math.floor((ms%3600000)/60000);return h>0?h+'h '+m+'m':m+'m';};
const toLDT=ts=>{const d=new Date(ts);return new Date(d.getTime()-d.getTimezoneOffset()*60000).toISOString().slice(0,16);};
const todayStr=()=>new Date().toISOString().slice(0,10);
const dots=(n,e)=>Array.from({length:n},(_,i)=>'<div class="pin-dot'+(i<e.length?' filled':'')+'"></div>').join('');
const numpad=attr=>[1,2,3,4,5,6,7,8,9,null,0,'⌫'].map(k=>k===null?'<button class="pinkey" style="visibility:hidden" disabled></button>':'<button class="pinkey" '+attr+'="'+k+'">'+k+'</button>').join('');
const TOLAB={pto:'PTO',sick:'Sick',holiday:'Holiday'};
const TOBADGE={pto:'badge-pto',sick:'badge-sick',holiday:'badge-holiday'};

function status(p){if(!p||!p.length)return'out';const l=p[0];if(l.type==='shift_in')return'in';if(l.type==='lunch_out')return'lunch';if(l.type==='lunch_in')return'in';return'out';}
function statusLabel(s){if(s==='in')return['In','badge-in'];if(s==='lunch')return['On lunch','badge-lunch'];return['Out','badge-out'];}
function actions(s){if(s==='out')return[['shift_in','Clock in for shift','btn-primary']];if(s==='in')return[['lunch_out','Start lunch','btn-sm btn-ghost'],['shift_out','Clock out','btn-danger']];if(s==='lunch')return[['lunch_in','End lunch','btn-primary'],['shift_out','Clock out','btn-danger']];return[];}
function tabSty(t){return 'padding:8px 12px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:none;color:'+(mgrTab===t?'var(--text)':'var(--muted)')+';border-bottom:2px solid '+(mgrTab===t?'var(--accent)':'transparent')+';margin-bottom:-1px;font-family:inherit';}

let view='home',agents=[],selAgent=null,pinE='',pinErr='',mgrE='',mgrErr='',aPunches=[],wPunches=[],wTO=[],loading=false,mgrTab='team',wkOffset=0;
let cpStep='current',cpNew='',cpE='',cpErr='',cpOk='';
let editAgent=null,editPunches=[],editMsg='';
let toAgent=null,toList=[],toMsg='';

function render(){
  document.getElementById('app').innerHTML={
    home:rHome,select:rSelect,pin:rPin,agent:rAgent,'change-pin':rChangePin,
    'mgr-pin':rMgrPin,mgr:rMgr,'edit-punches':rEditPunches,'time-off':rTimeOff
  }[view]();
  updateClock();
}

function rHome(){return '<div class="time-display" id="lt"></div><div style="display:flex;flex-direction:column;gap:10px;margin-top:1rem"><button class="btn btn-primary btn-full" id="b-ci">Clock in / out</button><button class="btn btn-full btn-ghost" id="b-mv">Manager view</button></div>';}

function rSelect(){
  if(loading)return '<div class="spinner"></div>';
  const rows=agents.length===0?'<p class="notice">No agents yet.</p>':agents.map((a,i)=>{const c=clr(i);const[lb,cls]=statusLabel(status(a._p));return '<div class="agent-row" data-aid="'+a.id+'"><div class="avatar" style="background:'+c.bg+';color:'+c.text+'">'+initials(a.name)+'</div><div style="flex:1"><div style="font-size:15px;font-weight:500">'+a.name+'</div></div><span class="badge '+cls+'">'+lb+'</span></div>';}).join('');
  return '<button class="btn btn-ghost btn-sm" id="b-back">← Back</button><div class="card" style="margin-top:12px"><div class="card-title">Select your name</div>'+rows+'</div>';
}

function rPin(){
  const a=selAgent,c=clr(agents.findIndex(x=>x.id===a.id));
  const[lb,cls]=statusLabel(status(aPunches));
  return '<button class="btn btn-ghost btn-sm" id="b-back">← Back</button><div class="card" style="text-align:center;margin-top:12px"><div class="avatar" style="background:'+c.bg+';color:'+c.text+';margin:0 auto 10px">'+initials(a.name)+'</div><div style="font-size:17px;font-weight:600">'+a.name+'</div><div style="margin-top:6px"><span class="badge '+cls+'">'+lb+'</span></div><div style="font-size:13px;color:var(--muted);margin-top:10px">Enter your PIN</div><div class="pin-dots" id="pd">'+dots(4,pinE)+'</div><div class="pinpad">'+numpad('data-pin')+'</div><div class="err" id="pe">'+pinErr+'</div></div>';
}

function rAgent(){
  const a=selAgent,c=clr(agents.findIndex(x=>x.id===a.id));
  const s=status(aPunches);const[lb,cls]=statusLabel(s);
  const today=aPunches.filter(p=>{const d=new Date();d.setHours(0,0,0,0);return new Date(p.punched_at)>=d;});
  const log=today.length===0?'<p class="notice" style="padding:0.5rem 0">No punches yet today</p>':today.map(p=>{const L={shift_in:'Shift start',shift_out:'Shift end',lunch_out:'Lunch start',lunch_in:'Lunch end'};return '<div class="punch-row"><span>'+L[p.type]+'</span><span>'+fmtT(p.punched_at)+'</span></div>';}).join('');
  const btns=actions(s).map(([t,l,bc])=>'<button class="btn '+bc+' btn-full" data-punch="'+t+'">'+l+'</button>').join('');
  return '<div class="card" style="text-align:center"><div class="avatar" style="background:'+c.bg+';color:'+c.text+';margin:0 auto 10px;width:48px;height:48px;font-size:15px">'+initials(a.name)+'</div><div style="font-size:17px;font-weight:600">'+a.name+'</div><div style="margin-top:6px"><span class="badge '+cls+'">'+lb+'</span></div></div>'+(loading?'<div class="spinner"></div>':'<div style="display:flex;flex-direction:column;gap:8px;margin-bottom:1rem">'+btns+'</div>')+'<div class="card"><div class="card-title">Today\'s punches</div>'+log+'</div><div style="display:flex;gap:8px;margin-top:4px"><button class="btn btn-ghost btn-sm" style="flex:1" id="b-cp">Change PIN</button><button class="btn btn-ghost btn-sm" style="flex:1" id="b-done">Done</button></div>';
}

function rChangePin(){
  const a=selAgent,c=clr(agents.findIndex(x=>x.id===a.id));
  const M={current:['Current PIN','Enter your current PIN','data-cpold'],new:['New PIN','Enter your new 4-digit PIN','data-cpnew'],confirm:['Confirm PIN','Enter your new PIN again','data-cpconf']};
  const[title,sub,attr]=M[cpStep];
  return '<button class="btn btn-ghost btn-sm" id="b-back">← Back</button><div class="card" style="text-align:center;margin-top:12px"><div class="avatar" style="background:'+c.bg+';color:'+c.text+';margin:0 auto 10px">'+initials(a.name)+'</div><div style="font-size:17px;font-weight:600">'+a.name+'</div><div style="font-size:13px;font-weight:500;margin-top:12px">'+title+'</div><div style="font-size:13px;color:var(--muted);margin-top:4px">'+sub+'</div><div class="pin-dots" id="cpd">'+dots(4,cpE)+'</div><div class="pinpad">'+numpad(attr)+'</div><div class="err" id="cpe">'+cpErr+'</div><div class="ok" id="cpo">'+cpOk+'</div></div>';
}

function rMgrPin(){return '<button class="btn btn-ghost btn-sm" id="b-back">← Back</button><div class="card" style="text-align:center;margin-top:12px"><div style="font-size:16px;font-weight:600;margin-bottom:4px">Manager PIN</div><div style="font-size:13px;color:var(--muted)">Enter your PIN</div><div class="pin-dots" id="md">'+dots(4,mgrE)+'</div><div class="pinpad">'+numpad('data-mpin')+'</div><div class="err" id="me">'+mgrErr+'</div></div>';}

function rMgr(){
  const active=agents.filter(a=>status(a._p)!=='out').length;
  const tabs='<div class="tab-bar"><button class="btn-tab" data-tab="team" style="'+tabSty('team')+'">Team</button><button class="btn-tab" data-tab="week" style="'+tabSty('week')+'">Reports</button><button class="btn-tab" data-tab="agents" style="'+tabSty('agents')+'">Agents</button><button class="btn btn-ghost btn-sm" id="b-exit" style="margin-left:auto;align-self:center">Exit</button></div>';

  if(mgrTab==='team'){
    const rows=agents.length===0?'<p class="notice">No agents yet.</p>':agents.map((a,i)=>{const c=clr(i);const[lb,cls]=statusLabel(status(a._p));const lp=a._p&&a._p[0];return '<div class="week-row"><div class="avatar" style="background:'+c.bg+';color:'+c.text+'">'+initials(a.name)+'</div><div style="flex:1"><div style="font-weight:500">'+a.name+'</div>'+(lp?'<div style="font-size:12px;color:var(--muted)">'+fmtD(lp.punched_at)+' · '+fmtT(lp.punched_at)+'</div>':'')+'</div><span class="badge '+cls+'">'+lb+'</span></div>';}).join('');
    return tabs+'<div class="stat-grid"><div class="stat"><div class="stat-val">'+agents.length+'</div><div class="stat-label">Agents</div></div><div class="stat"><div class="stat-val">'+active+'</div><div class="stat-label">Clocked in</div></div><div class="stat"><div class="stat-val">'+(agents.length-active)+'</div><div class="stat-label">Off</div></div></div><div class="card">'+rows+'</div>';
  }

  if(mgrTab==='week'){
    if(loading)return tabs+'<div class="spinner"></div>';
    const{start,end}=getWeekRange(wkOffset);
    const fmt=d=>d.toLocaleDateString([],{month:'short',day:'numeric'});
    const nav='<div class="week-nav"><button class="btn btn-sm btn-ghost" id="b-wp">← Prev</button><span>'+fmt(start)+' – '+fmt(end)+'</span><button class="btn btn-sm btn-ghost" id="b-wn"'+(wkOffset===0?' disabled style="opacity:0.3"':'')+'>Next →</button></div>';
    const grouped={};agents.forEach(a=>grouped[a.id]={name:a.name,ci:agents.findIndex(x=>x.id===a.id),punches:[],to:[]});
    wPunches.forEach(p=>{if(grouped[p.agent_id])grouped[p.agent_id].punches.push(p);});
    wTO.forEach(t=>{if(grouped[t.agent_id])grouped[t.agent_id].to.push(t);});
    const rows=Object.values(grouped).map(g=>{
      if(!g.punches.length&&!g.to.length)return'';
      let sMs=0,lMs=0,sS=null,lS=null;
      g.punches.forEach(p=>{if(p.type==='shift_in')sS=new Date(p.punched_at);if(p.type==='shift_out'&&sS){sMs+=new Date(p.punched_at)-sS;sS=null;}if(p.type==='lunch_out')lS=new Date(p.punched_at);if(p.type==='lunch_in'&&lS){lMs+=new Date(p.punched_at)-lS;lS=null;}});
      const wMs=sMs-lMs,toH=g.to.reduce((s,t)=>s+Number(t.hours),0);
      const toBadges=g.to.map(t=>'<span class="badge '+(TOBADGE[t.type]||'badge-out')+'" style="margin-right:3px">'+TOLAB[t.type]+' '+t.hours+'h</span>').join('');
      const c=clr(g.ci);
      return '<div class="week-row"><div class="avatar" style="background:'+c.bg+';color:'+c.text+';flex-shrink:0">'+initials(g.name)+'</div><div style="flex:1;min-width:100px"><div style="font-weight:500">'+g.name+'</div>'+(toBadges?'<div style="margin-top:3px">'+toBadges+'</div>':'')+'</div><div style="text-align:right;font-size:13px"><div style="font-weight:500">'+fmtDur(wMs)+' worked</div>'+(toH?'<div style="color:var(--muted);font-size:11px">+'+toH+'h time off</div>':'')+'</div></div>';
    }).filter(Boolean).join('')||'<p class="notice">No data for this week.</p>';
    return tabs+nav+'<div class="card">'+rows+'</div><button class="btn btn-primary btn-full" id="b-export" style="margin-top:4px">Export CSV for HR</button>';
  }

  if(mgrTab==='agents'){
    const rows=agents.length===0?'<p class="notice">No agents yet.</p>':agents.map((a,i)=>{const c=clr(i);return '<div class="week-row"><div class="avatar" style="background:'+c.bg+';color:'+c.text+'">'+initials(a.name)+'</div><div style="flex:1;font-weight:500;min-width:80px">'+a.name+'</div><div style="display:flex;gap:5px;flex-wrap:wrap"><button class="btn btn-sm" data-rpin="'+a.id+'" style="font-size:11px">Reset PIN</button><button class="btn btn-sm" data-tob="'+a.id+'" style="font-size:11px">Time off</button><button class="btn btn-sm" data-epb="'+a.id+'" style="font-size:11px">Punches</button><button class="btn btn-sm" data-rid="'+a.id+'" style="color:#C0392B;border-color:#C0392B;font-size:11px">Remove</button></div></div>';}).join('');
    return tabs+'<div class="card" style="margin-bottom:12px"><div class="card-title">Add agent</div><div style="display:flex;flex-direction:column;gap:8px"><input type="text" id="nn" placeholder="Full name" /><input type="password" id="np" placeholder="4-digit PIN" maxlength="4" /><button class="btn btn-primary" id="b-add">Add agent</button></div><div class="err" id="ae"></div></div><div class="card">'+rows+'</div>';
  }
}

function rEditPunches(){
  const a=editAgent,c=clr(agents.findIndex(x=>x.id===a.id));
  const PL={shift_in:'Shift In',shift_out:'Shift Out',lunch_out:'Lunch Out',lunch_in:'Lunch In'};
  const rows=editPunches.slice(0,20).map(p=>'<div class="row-item"><div style="flex:1"><div style="font-weight:500">'+PL[p.type]+'</div><div style="font-size:11px;color:var(--muted)">'+fmtD(p.punched_at)+' · '+fmtT(p.punched_at)+'</div></div><button class="btn btn-sm" style="color:#C0392B;border-color:#C0392B" data-dp="'+p.id+'">Delete</button></div>').join('')||'<p class="notice">No punches.</p>';
  return '<button class="btn btn-ghost btn-sm" id="b-back">← Back</button><div class="card" style="margin-top:12px"><div style="display:flex;align-items:center;gap:10px;margin-bottom:1rem"><div class="avatar" style="background:'+c.bg+';color:'+c.text+'">'+initials(a.name)+'</div><div style="font-size:16px;font-weight:600">'+a.name+'</div></div><div class="card-title">Add a punch</div><div style="display:flex;flex-direction:column;gap:8px;margin-bottom:1rem"><select id="apt"><option value="shift_in">Shift In</option><option value="shift_out">Shift Out</option><option value="lunch_out">Lunch Out</option><option value="lunch_in">Lunch In</option></select><input type="datetime-local" id="apdt" value="'+toLDT(new Date())+'" /><button class="btn btn-primary" id="b-ap">Add punch</button></div><div class="ok" id="em">'+editMsg+'</div></div><div class="card"><div class="card-title">Recent punches</div>'+rows+'</div>';
}

function rTimeOff(){
  const a=toAgent,c=clr(agents.findIndex(x=>x.id===a.id));
  const rows=toList.slice(0,30).map(t=>'<div class="row-item"><div style="flex:1"><span class="badge '+(TOBADGE[t.type]||'badge-out')+'" style="margin-right:6px">'+TOLAB[t.type]+'</span><span style="font-weight:500">'+t.date+'</span>'+(t.note?' <span style="color:var(--muted);font-size:12px">· '+t.note+'</span>':'')+'</div><div style="font-size:13px;font-weight:500;margin-right:8px">'+t.hours+'h</div><button class="btn btn-sm" style="color:#C0392B;border-color:#C0392B" data-dto="'+t.id+'">Delete</button></div>').join('')||'<p class="notice">No time off recorded.</p>';
  return '<button class="btn btn-ghost btn-sm" id="b-back">← Back</button><div class="card" style="margin-top:12px"><div style="display:flex;align-items:center;gap:10px;margin-bottom:1rem"><div class="avatar" style="background:'+c.bg+';color:'+c.text+'">'+initials(a.name)+'</div><div style="font-size:16px;font-weight:600">'+a.name+'</div></div><div class="card-title">Add time off</div><div style="display:flex;flex-direction:column;gap:8px;margin-bottom:1rem"><select id="tot"><option value="pto">PTO</option><option value="sick">Sick Day</option><option value="holiday">Company Holiday</option></select><input type="date" id="tod" value="'+todayStr()+'" /><input type="number" id="toh" placeholder="Hours (e.g. 8)" min="1" max="24" value="8" /><input type="text" id="ton" placeholder="Note (optional)" /><button class="btn btn-primary" id="b-ato">Add time off</button></div><div class="ok" id="tom">'+toMsg+'</div></div><div class="card"><div class="card-title">Time off history</div>'+rows+'</div>';
}

document.getElementById('app').addEventListener('click',async e=>{
  // Agent PIN
  const pb=e.target.closest('[data-pin]');
  if(pb){const k=pb.dataset.pin;if(k==='⌫')pinE=pinE.slice(0,-1);else if(pinE.length<4)pinE+=k;document.getElementById('pd').innerHTML=dots(4,pinE);if(pinE.length===4){if(pinE===selAgent.pin){pinE='';pinErr='';view='agent';render();}else{pinErr='Incorrect PIN.';pinE='';document.getElementById('pd').innerHTML=dots(4,'');document.getElementById('pe').textContent=pinErr;}}return;}

  // Manager PIN
  const mb=e.target.closest('[data-mpin]');
  if(mb){const k=mb.dataset.mpin;if(k==='⌫')mgrE=mgrE.slice(0,-1);else if(mgrE.length<4)mgrE+=k;document.getElementById('md').innerHTML=dots(4,mgrE);if(mgrE.length===4){if(mgrE===MPIN){mgrE='';mgrErr='';await loadAgents();view='mgr';render();}else{mgrErr='Incorrect PIN.';mgrE='';document.getElementById('md').innerHTML=dots(4,'');document.getElementById('me').textContent=mgrErr;}}return;}

  // Change PIN steps
  const co=e.target.closest('[data-cpold]');
  if(co){const k=co.dataset.cpold;if(k==='⌫')cpE=cpE.slice(0,-1);else if(cpE.length<4)cpE+=k;document.getElementById('cpd').innerHTML=dots(4,cpE);if(cpE.length===4){if(cpE===selAgent.pin){cpE='';cpErr='';cpStep='new';render();}else{cpErr='Incorrect PIN.';cpE='';document.getElementById('cpd').innerHTML=dots(4,'');document.getElementById('cpe').textContent=cpErr;}}return;}
  const cn=e.target.closest('[data-cpnew]');
  if(cn){const k=cn.dataset.cpnew;if(k==='⌫')cpE=cpE.slice(0,-1);else if(cpE.length<4)cpE+=k;document.getElementById('cpd').innerHTML=dots(4,cpE);if(cpE.length===4){cpNew=cpE;cpE='';cpStep='confirm';render();}return;}
  const cc=e.target.closest('[data-cpconf]');
  if(cc){const k=cc.dataset.cpconf;if(k==='⌫')cpE=cpE.slice(0,-1);else if(cpE.length<4)cpE+=k;document.getElementById('cpd').innerHTML=dots(4,cpE);if(cpE.length===4){if(cpE===cpNew){try{await setPin(selAgent.id,cpNew);selAgent.pin=cpNew;await loadAgents();cpOk='PIN updated!';cpErr='';cpE='';cpStep='current';render();setTimeout(()=>{view='agent';render();},1500);}catch(ex){cpErr='Error. Try again.';cpE='';document.getElementById('cpd').innerHTML=dots(4,'');document.getElementById('cpe').textContent=cpErr;}}else{cpErr='PINs do not match.';cpE='';cpNew='';cpStep='new';render();}}return;}

  // Punch
  const punchB=e.target.closest('[data-punch]');
  if(punchB){loading=true;render();try{await addPunch(selAgent.id,punchB.dataset.punch);aPunches=await getPunches(selAgent.id);await loadAgents();}catch(err){alert('Error: '+err.message);}loading=false;render();return;}

  // Tab
  const tabB=e.target.closest('[data-tab]');
  if(tabB){mgrTab=tabB.dataset.tab;if(mgrTab==='week')await loadWeek();render();return;}

  // Remove agent
  const ridB=e.target.closest('[data-rid]');
  if(ridB){if(!confirm('Remove this agent?'))return;await db('DELETE','agents',null,{id:'eq.'+ridB.dataset.rid});await loadAgents();render();return;}

  // Reset PIN
  const rpB=e.target.closest('[data-rpin]');
  if(rpB){const p=prompt('New 4-digit PIN:');if(!p)return;if(!/^\d{4}$/.test(p)){alert('Must be 4 digits.');return;}try{await setPin(rpB.dataset.rpin,p);await loadAgents();alert('PIN reset!');}catch(ex){alert('Error: '+ex.message);}return;}

  // Edit punches
  const epB=e.target.closest('[data-epb]');
  if(epB){editAgent=agents.find(a=>a.id===Number(epB.dataset.epb));editPunches=await getPunches(editAgent.id);editMsg='';view='edit-punches';render();return;}

  // Delete punch
  const dpB=e.target.closest('[data-dp]');
  if(dpB){if(!confirm('Delete this punch?'))return;try{await delPunch(dpB.dataset.dp);editPunches=await getPunches(editAgent.id);editMsg='Deleted.';render();}catch(ex){alert('Error: '+ex.message);}return;}

  // Time off
  const toB=e.target.closest('[data-tob]');
  if(toB){toAgent=agents.find(a=>a.id===Number(toB.dataset.tob));toList=await getTO(toAgent.id)||[];toMsg='';view='time-off';render();return;}

  // Delete time off
  const dtoB=e.target.closest('[data-dto]');
  if(dtoB){if(!confirm('Delete this entry?'))return;try{await delTO(dtoB.dataset.dto);toList=await getTO(toAgent.id)||[];toMsg='Deleted.';render();}catch(ex){alert('Error: '+ex.message);}return;}

  // Agent row
  const aRow=e.target.closest('[data-aid]');
  if(aRow&&view==='select'){selAgent=agents.find(a=>a.id==aRow.dataset.aid);aPunches=selAgent._p||[];pinE='';pinErr='';view='pin';render();return;}

  // Named buttons
  const bid=e.target.id||e.target.closest('button')?.id;
  if(bid==='b-ci'){loading=true;render();await loadAgents();view='select';loading=false;render();}
  else if(bid==='b-mv'){mgrE='';mgrErr='';view='mgr-pin';render();}
  else if(bid==='b-back'){
    if(view==='change-pin'){cpStep='current';cpE='';cpErr='';cpOk='';view='agent';}
    else if(view==='edit-punches'||view==='time-off'){view='mgr';mgrTab='agents';}
    else if(view==='pin')view='select';
    else if(view==='select')view='home';
    else view='home';
    render();
  }
  else if(bid==='b-done'||bid==='b-exit'){view='home';render();}
  else if(bid==='b-cp'){cpStep='current';cpE='';cpErr='';cpOk='';view='change-pin';render();}
  else if(bid==='b-wp'){wkOffset--;await loadWeek();render();}
  else if(bid==='b-wn'){if(wkOffset<0){wkOffset++;await loadWeek();render();}}
  else if(bid==='b-add'){
    const name=document.getElementById('nn').value.trim();
    const pin=document.getElementById('np').value.trim();
    const err=document.getElementById('ae');
    if(!name){err.textContent='Enter a name.';return;}
    if(!/^\d{4}$/.test(pin)){err.textContent='PIN must be 4 digits.';return;}
    try{await db('POST','agents',{name,pin});await loadAgents();render();}catch(ex){err.textContent=ex.message;}
  }
  else if(bid==='b-ap'){
    const type=document.getElementById('apt').value;
    const val=document.getElementById('apdt').value;
    if(!val){editMsg='Pick a time.';render();return;}
    try{await addPunchAt(editAgent.id,type,new Date(val).toISOString());editPunches=await getPunches(editAgent.id);editMsg='Added!';}
    catch(ex){editMsg='Error: '+ex.message;}
    render();
  }
  else if(bid==='b-ato'){
    const type=document.getElementById('tot').value;
    const date=document.getElementById('tod').value;
    const hours=document.getElementById('toh').value;
    const note=document.getElementById('ton').value.trim();
    if(!date||!hours){toMsg='Fill in date and hours.';render();return;}
    try{await addTO(toAgent.id,date,type,Number(hours),note);toList=await getTO(toAgent.id)||[];toMsg='Added!';}
    catch(ex){toMsg='Error: '+ex.message;}
    render();
  }
  else if(bid==='b-export'){exportCSV();}
});

async function loadAgents(){
  try{agents=await getAgents();await Promise.all(agents.map(async a=>{a._p=await getPunches(a.id);}));}
  catch(e){alert('Could not load: '+e.message);}
}

async function loadWeek(){
  loading=true;render();
  const{start,end}=getWeekRange(wkOffset);
  try{
    wPunches=await db('GET','punches',null,{select:'*,agents(name)',punched_at:'gte.'+start.toISOString(),'and':'(punched_at.lte.'+end.toISOString()+')',order:'punched_at.asc'})||[];
    wTO=await db('GET','time_off',null,{select:'*,agents(name)',date:'gte.'+start.toISOString().slice(0,10),'and':'(date.lte.'+end.toISOString().slice(0,10)+')',order:'date.asc'})||[];
  }catch(e){wPunches=[];wTO=[];}
  loading=false;
}

function exportCSV(){
  const{start}=getWeekRange(wkOffset);
  const wk=start.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  const grouped={};agents.forEach(a=>grouped[a.id]={name:a.name,events:[],to:[]});
  wPunches.forEach(p=>{if(grouped[p.agent_id])grouped[p.agent_id].events.push(p);});
  wTO.forEach(t=>{if(grouped[t.agent_id])grouped[t.agent_id].to.push(t);});
  let csv='Agent,Date,Shift Start,Shift End,Lunch Start,Lunch End,Hours Worked,Lunch Duration,Time Off Type,Time Off Hours,Note\n';
  Object.values(grouped).forEach(g=>{
    if(!g.events.length&&!g.to.length)return;
    let wkTotal=0,toTotal=0;
    const byDay={};
    g.events.forEach(p=>{const day=new Date(p.punched_at).toLocaleDateString();if(!byDay[day])byDay[day]={punches:[],to:[]};byDay[day].punches.push(p);});
    g.to.forEach(t=>{const day=new Date(t.date+'T12:00:00').toLocaleDateString();if(!byDay[day])byDay[day]={punches:[],to:[]};byDay[day].to.push(t);});
    Object.entries(byDay).forEach(([day,data])=>{
      let si=null,so=null,lo=null,li=null;
      data.punches.forEach(p=>{if(p.type==='shift_in')si=new Date(p.punched_at);if(p.type==='shift_out')so=new Date(p.punched_at);if(p.type==='lunch_out')lo=new Date(p.punched_at);if(p.type==='lunch_in')li=new Date(p.punched_at);});
      const lMs=(lo&&li)?li-lo:0,sMs=(si&&so)?so-si:0,wMs=sMs-lMs;
      wkTotal+=wMs;
      const toH=data.to.reduce((s,t)=>s+Number(t.hours),0)||'';
      toTotal+=Number(toH)||0;
      const fmt=t=>t?t.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}):'';
      const hrs=ms=>ms>0?(ms/3600000).toFixed(2):'';
      const toTypes=data.to.map(t=>TOLAB[t.type]||t.type).join(', ');
      const toNotes=data.to.map(t=>t.note).filter(Boolean).join(', ');
      csv+='"'+g.name+'","'+day+'","'+fmt(si)+'","'+fmt(so)+'","'+fmt(lo)+'","'+fmt(li)+'","'+hrs(wMs)+'","'+hrs(lMs)+'","'+toTypes+'","'+toH+'","'+toNotes+'"\n';
    });
    csv+='"'+g.name+' — WEEKLY TOTAL","","","","","","'+(wkTotal/3600000).toFixed(2)+'","","","'+(toTotal||'')+'",""\n';
    csv+='"","","","","","","","","","",""\n';
  });
  const link=document.createElement('a');
  link.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  link.download='timeclock_'+wk.replace(' ','_')+'.csv';
  link.click();
}

function updateClock(){
  const now=new Date();
  const t=document.getElementById('lt')||document.getElementById('live-time');
  const d=document.getElementById('live-date');
  if(t)t.textContent=now.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  if(d)d.textContent=now.toLocaleDateString([],{weekday:'long',month:'long',day:'numeric'});
}
setInterval(updateClock,1000);
render();
</script>
